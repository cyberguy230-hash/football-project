<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Event Registration</title>

    {% load static %}

    <style>
        /* =========================
           BODY & BACKGROUND
        ========================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;

            /* Background image with dark overlay */
            background:
                linear-gradient(
                    rgba(0,0,0,0.45),
                    rgba(0,0,0,0.45)
                ),
                url("{% static 'images/goat.jpg' %}");
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: scroll;
        }

        /* =========================
           FORM CONTAINER
        ========================== */
        .container {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            width: 90%;
            max-width: 420px;
            position: relative;
            z-index: 2;
            transform: scale(0);
            animation: scaleUp 0.7s forwards;
        }

        @keyframes scaleUp {
            to { transform: scale(1); }
        }

        h2 {
            text-align: center;
            color: #0072ff;
            margin-bottom: 20px;
            animation: fadeIn 1s forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        form {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s forwards;
        }

        input:focus {
            border-color: #0072ff;
            box-shadow: 0 0 8px rgba(0, 114, 255, 0.3);
            outline: none;
        }

        input[type="submit"] {
            margin-top: 25px;
            background: linear-gradient(to right, #0072ff, #00c6ff);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
        }

        input[type="submit"]:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        #full_name { animation-delay: 0.2s; }
        #age { animation-delay: 0.4s; }
        #team_name { animation-delay: 0.6s; }
        #player_name { animation-delay: 0.8s; }

        /* =========================
           MUSIC OVERLAY
        ========================== */
        #musicOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            cursor: pointer;
        }

        .musicBox {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            padding: 45px 65px;
            border-radius: 20px;
            text-align: center;
            color: white;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            animation: popIn 0.5s ease;
            max-width: 90%;
        }

        .musicIcon { font-size: 55px; margin-bottom: 10px; }
        .musicBox h2 { margin: 10px 0; color: white; }
        .musicBox p { font-size: 15px; opacity: 0.9; }

        @keyframes popIn {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        /* =========================
           RESPONSIVE
        ========================== */
        @media (max-width: 768px) {
            body { background-position: top center; }
            .container { width: 92%; padding: 25px; border-radius: 15px; }
            h2 { font-size: 1.4rem; }
            input { font-size: 16px; }
        }
    </style>
</head>

<body>
    <!-- 🎧 AUDIO -->
    <audio id="bgMusic" loop>
        <source src="{% static 'audio/wcsong.mp3' %}" type="audio/mpeg">
    </audio>

    <!-- 🎵 MUSIC OVERLAY -->
    <div id="musicOverlay">
        <div class="musicBox">
            <div class="musicIcon">🎵</div>
            <h2>World Cup Anthem</h2>
            <p>Click anywhere to start the experience</p>
        </div>
    </div>

    <!-- FORM -->
    <div class="container">
        <h2>🏆 World Cup Event Registration</h2>

        <form action="/" method="POST">
            {% csrf_token %}
            <label for="full_name">Full Name:</label>
            <input type="text" id="full_name" name="name" required>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required>

            <label for="team_name">Supporting Team:</label>
            <input type="text" id="team_name" name="team_name" required>

            <label for="player_name">Favorite Player:</label>
            <input type="text" id="player_name" name="player_name" required>

            <input type="submit" value="Register">
        </form>
    </div>

    <!-- SCRIPT -->
    <script>
        const bgMusic = document.getElementById('bgMusic');
        const overlay = document.getElementById('musicOverlay');

        bgMusic.volume = 0.5;
        bgMusic.loop = true;

        overlay.addEventListener('click', () => {
            bgMusic.play().catch(() => {});
            overlay.style.transition = "opacity 0.5s ease";
            overlay.style.opacity = "0";
            setTimeout(() => { overlay.style.display = "none"; }, 500);
        });
    </script>
</body>
</html>
